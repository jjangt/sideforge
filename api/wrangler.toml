name = "sideforge-api"
main = "src/index.ts"
compatibility_date = "2024-12-01"

[ai]
binding = "AI"

[[d1_databases]]
binding = "DB"
database_name = "sideforge-db"
database_id = "50a5ddaa-bd35-4230-8938-ccd28477170a"

[vars]
ENVIRONMENT = "production"

# Secrets (set via `wrangler secret put`):
# - YOUTUBE_API_KEY
# - JWT_SECRET
# - PASSWORD_SALT
# - GOOGLE_CLIENT_ID

# ─── Development Environment ──────────────────────────────────────────────────

[env.development]
name = "sideforge-api-dev"

[env.development.vars]
ENVIRONMENT = "development"

[[env.development.d1_databases]]
binding = "DB"
database_name = "sideforge-db-dev"
database_id = "42afbfc7-3423-4a53-a8ff-b7ef6aca5951"

[env.development.ai]
binding = "AI"
